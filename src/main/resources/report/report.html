<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page {
            size: A4;
            margin: 96px 38px 58px 38px;
            @top-center { content: element(pageHeader); }
            @bottom-left {
                content: "[[${m.t.reportFooter}]]";
                font-family: Helvetica, Arial, sans-serif; font-size: 8px; color: #888;
            }
            @bottom-right {
                content: "[[${m.t.page}]] " counter(page) " / " counter(pages);
                font-family: Helvetica, Arial, sans-serif; font-size: 8px; color: #888;
            }
        }

        body { font-family: Helvetica, Arial, sans-serif; font-size: 10px; color: #1b1b1b; }

        /* Logo header repeated on every page */
        #pageHeader { position: running(pageHeader); width: 100%; }
        #pageHeader table { width: 100%; border-collapse: collapse; }
        #pageHeader td { vertical-align: middle; }
        #pageHeader .osp { text-align: left; }
        #pageHeader .offitec { text-align: right; }
        #pageHeader img.osp-logo { height: 50px; }
        #pageHeader img.offitec-logo { height: 44px; }
        #pageHeader .rule { border-bottom: 1px solid #d0d0d0; height: 4px; }

        h1.report-title {
            font-size: 13px; letter-spacing: 1px; color: #333; margin: 0 0 12px 0;
            text-transform: uppercase;
        }
        .section-title {
            font-size: 11px; font-weight: bold; color: #1f4e9b;
            margin: 16px 0 5px 0;
        }

        table.data { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
        table.data td { padding: 4px 8px; }
        table.data tr:nth-child(odd) td { background: #eef3fb; }
        table.data .label { width: 56%; }
        table.data .unit { width: 14%; color: #555; }
        table.data .value { width: 30%; text-align: right; font-weight: bold; }

        /* Project info: two columns, label + value */
        table.kv { width: 100%; border-collapse: collapse; border: 1px solid #ccc; margin-bottom: 4px; }
        table.kv td { padding: 5px 8px; border-bottom: 1px solid #e2e2e2; }
        table.kv .k { width: 28%; color: #444; }
        /* User-entered values can contain locale-specific characters (e.g. Turkish "İzmir"),
           so render them with the embedded glyph-complete font. */
        table.kv .v { font-family: 'Geist', Helvetica, Arial, sans-serif; }
        .block-title {
            background: #282f68; color: #fff; font-weight: bold; font-size: 10px;
            padding: 5px 8px; margin-top: 16px;
        }

        /* Configuration block: details on the left, the unit's primary image on the right */
        table.config { width: 100%; border-collapse: collapse; }
        table.config td { vertical-align: top; }
        table.config td.config-img-cell { width: 200px; text-align: right; }
        img.config-image { max-width: 190px; max-height: 140px; }
        .config-line { margin: 2px 0; }
        .config-line .k { font-weight: bold; display: inline-block; width: 90px; }

        /* Full load cooling table */
        table.fl { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
        table.fl td, table.fl th {
            padding: 5px 6px; text-align: center; border: 1px solid #e2e2e2; font-weight: normal;
        }
        /* Column headers (the ambient temperature row) and the row-label column are white;
           only the calculated value cells use the soft blue from the other tables. */
        table.fl th { background: #ffffff; text-align: left; width: 30%; }
        table.fl tr.ambients td { background: #ffffff; }
        table.fl tr.values td { background: #eef3fb; }
        /* Row-label (leftmost) column stays white; placed after the row rules so it wins. */
        table.fl td.rowhead { background: #ffffff; text-align: left; font-weight: bold; }

        .chart { text-align: center; margin: 6px 0 4px 0; page-break-inside: avoid; }
        .note { font-size: 8.5px; color: #666; margin: 2px 0; }
        .avoid-break { page-break-inside: avoid; }

        /* Technical drawings (end of report) */
        .drawing { text-align: center; margin: 8px 0; page-break-inside: avoid; }
        img.drawing-image { max-width: 100%; max-height: 360px; }
    </style>
</head>
<body>

<!-- ===== Repeating logo header (OSP top-left, Offitec top-right) ===== -->
<div id="pageHeader">
    <table>
        <tr>
            <td class="osp"><img class="osp-logo" th:src="${ospLogo}" alt="OSP"/></td>
            <td class="offitec"><img class="offitec-logo" th:src="${offitecLogo}" alt="Offitec"/></td>
        </tr>
        <tr><td colspan="2" class="rule"></td></tr>
    </table>
</div>

<!-- ===== Project Information ===== -->
<div class="avoid-break">
    <div class="block-title" th:text="${m.t.projectInformation}"></div>
    <table class="kv">
        <tr><td class="k" th:text="${m.t.projectName}"></td><td class="v" th:text="${m.projectName}"></td></tr>
        <tr><td class="k" th:text="${m.t.nameLabel}"></td><td class="v" th:text="${m.responsiblePerson}"></td></tr>
        <tr><td class="k" th:text="${m.t.emailAddress}"></td><td class="v" th:text="${m.email}"></td></tr>
        <tr><td class="k" th:text="${m.t.phoneNumber}"></td><td class="v" th:text="${m.phone}"></td></tr>
        <tr><td class="k" th:text="${m.t.country}"></td><td class="v" th:text="${m.country}"></td></tr>
        <tr><td class="k" th:text="${m.t.city}"></td><td class="v" th:text="${m.city}"></td></tr>
        <tr><td class="k" th:text="${m.t.address}"></td><td class="v" th:text="${m.address}"></td></tr>
        <tr><td class="k" th:text="${m.t.date}"></td><td class="v" th:text="${m.printedDate}"></td></tr>
    </table>
</div>

<!-- ===== Configuration (with the unit's primary image alongside) ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.configuration}"></div>
    <table class="config">
        <tr>
            <td>
                <div class="config-line"><span class="k" th:text="${m.t.model}"></span><span th:text="${m.model}"></span></div>
                <div class="config-line"><span class="k" th:text="${m.t.category}"></span><span th:text="${m.category}"></span></div>
            </td>
            <td class="config-img-cell">
                <img th:if="${primaryImage}" class="config-image" th:src="${primaryImage}" alt=""/>
            </td>
        </tr>
    </table>
</div>

<!-- ===== Inputs (Design) ===== -->
<!-- For a dual-mode (heat pump) report this block is the Cooling point. -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.dualMode ? m.t.coolingInputs : m.t.inputs}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.ambientTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.ambient}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterInletTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.waterInlet}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterOutletTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.waterOutlet}"></td></tr>
        <tr><td class="label" th:text="${m.t.glycolMixture}"></td><td class="unit"></td><td class="value" th:text="${m.glycolMixture}"></td></tr>
    </table>
</div>

<!-- ===== Working Limit Graph (Cooling) ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.dualMode ? m.t.coolingWorkingLimitGraph : m.t.workingLimitGraph}"></div>
    <div class="chart" th:utext="${workingLimitSvg}"></div>
</div>

<!-- ===== Outputs ===== -->
<!-- For a dual-mode (heat pump) report this block is the Cooling point. -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.dualMode ? m.t.coolingOutputs : m.t.outputs}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.coolingCapacity}"></td><td class="unit">kcal/h</td><td class="value" th:text="${m.coolingCapacityKcalh}"></td></tr>
        <tr><td class="label" th:text="${m.t.coolingCapacity}"></td><td class="unit">kW</td><td class="value" th:text="${m.coolingCapacityKw}"></td></tr>
        <tr><td class="label" th:text="${m.t.inputPower}"></td><td class="unit">kW</td><td class="value" th:text="${m.inputPowerKw}"></td></tr>
        <tr><td class="label" th:text="${m.eerCopLabel}"></td><td class="unit">W/W</td><td class="value" th:text="${m.eerCopValue}"></td></tr>
    </table>
</div>

<!-- ===== Full Load Cooling ===== -->
<!-- Wrapped so the header stays on the same page as its table. -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.fullLoadCooling}"></div>
    <table class="fl">
        <tr class="ambients">
            <th th:text="${m.t.dryBulbAmbientAir}"></th>
            <td th:each="r : ${m.fullLoad}" th:text="${r.ambient}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.t.capacityKw}"></td>
            <td th:each="r : ${m.fullLoad}" th:text="${r.capacity}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.t.inputPowerKw}"></td>
            <td th:each="r : ${m.fullLoad}" th:text="${r.power}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.eerCopLabel} + ' [W/W]'"></td>
            <td th:each="r : ${m.fullLoad}" th:text="${r.eerCop}"></td>
        </tr>
    </table>
    <div class="note" th:text="${m.t.fullLoadNote}"></div>
</div>

<!-- ===== Heating Inputs (dual-mode heat pump only) ===== -->
<!-- No glycol row: heating heats the water, so no glycol mixture is used. -->
<div class="avoid-break" th:if="${m.dualMode}">
    <div class="section-title" th:text="${m.t.heatingInputs}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.ambientTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.heatingAmbient}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterInletTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.heatingWaterInlet}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterOutletTemperature}"></td><td class="unit">°C</td><td class="value" th:text="${m.heatingWaterOutlet}"></td></tr>
    </table>
</div>

<!-- ===== Working Limit Graph (Heating, dual-mode only) ===== -->
<div class="avoid-break" th:if="${m.dualMode}">
    <div class="section-title" th:text="${m.t.heatingWorkingLimitGraph}"></div>
    <div class="chart" th:utext="${heatingWorkingLimitSvg}"></div>
</div>

<!-- ===== Heating Outputs (dual-mode only) ===== -->
<div class="avoid-break" th:if="${m.dualMode}">
    <div class="section-title" th:text="${m.t.heatingOutputs}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.heatingCapacity}"></td><td class="unit">kcal/h</td><td class="value" th:text="${m.heatingCapacityKcalh}"></td></tr>
        <tr><td class="label" th:text="${m.t.heatingCapacity}"></td><td class="unit">kW</td><td class="value" th:text="${m.heatingCapacityKw}"></td></tr>
        <tr><td class="label" th:text="${m.t.inputPower}"></td><td class="unit">kW</td><td class="value" th:text="${m.heatingInputPowerKw}"></td></tr>
        <tr><td class="label" th:text="${m.t.cop}"></td><td class="unit">W/W</td><td class="value" th:text="${m.heatingCopValue}"></td></tr>
    </table>
</div>

<!-- ===== Full Load Heating (dual-mode only) ===== -->
<div class="avoid-break" th:if="${m.dualMode}">
    <div class="section-title" th:text="${m.t.fullLoadHeating}"></div>
    <table class="fl">
        <tr class="ambients">
            <th th:text="${m.t.dryBulbAmbientAir}"></th>
            <td th:each="r : ${m.heatingFullLoad}" th:text="${r.ambient}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.t.capacityKw}"></td>
            <td th:each="r : ${m.heatingFullLoad}" th:text="${r.capacity}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.t.inputPowerKw}"></td>
            <td th:each="r : ${m.heatingFullLoad}" th:text="${r.power}"></td>
        </tr>
        <tr class="values">
            <td class="rowhead" th:text="${m.t.cop} + ' [W/W]'"></td>
            <td th:each="r : ${m.heatingFullLoad}" th:text="${r.eerCop}"></td>
        </tr>
    </table>
    <div class="note" th:text="${m.t.fullLoadNote}"></div>
</div>

<!-- ===== Technical Specifications ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.unitTechnicalSpecifications}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.refrigerant}"></td><td class="unit">-</td><td class="value" th:text="${m.refrigerantCode}"></td></tr>
        <tr><td class="label" th:text="${m.t.compressorModel}"></td><td class="unit">-</td><td class="value" th:text="${m.compressorModel}"></td></tr>
        <tr><td class="label" th:text="${m.t.compressorBrand}"></td><td class="unit">-</td><td class="value" th:text="${m.compressorBrand}"></td></tr>
        <tr><td class="label" th:text="${m.t.compressorQuantity}"></td><td class="unit">n</td><td class="value" th:text="${m.compressorQty}"></td></tr>
        <tr><td class="label" th:text="${m.t.circuitQuantity}"></td><td class="unit">n</td><td class="value" th:text="${m.circuitQty}"></td></tr>
        <tr><td class="label" th:text="${m.t.condenserType}"></td><td class="unit">Type</td><td class="value" th:text="${m.condenserType}"></td></tr>
    </table>
</div>

<!-- ===== Hydraulic Kit ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.hydraulicKit}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.evaporatorType}"></td><td class="unit">Type</td><td class="value" th:text="${m.evaporatorType}"></td></tr>
        <tr><td class="label" th:text="${m.t.flowRate}"></td><td class="unit">m³/h</td><td class="value" th:text="${m.flowRate}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterPressureSystemNeed}"></td><td class="unit">bar</td><td class="value" th:text="${m.waterPressure}"></td></tr>
        <tr><td class="label" th:text="${m.t.pressureDrop}"></td><td class="unit">kPa</td><td class="value" th:text="${m.pressureDrop}"></td></tr>
    </table>
</div>

<!-- ===== Pressure Drop / Flow Rate Graph (Cooling) ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.dualMode ? m.t.coolingPressureGraph : m.t.pressureDropFlowRateGraph}"></div>
    <div class="chart" th:utext="${pressureDropSvg}"></div>
</div>

<!-- ===== Pressure Drop / Flow Rate Graph (Heating, dual-mode only) ===== -->
<div class="avoid-break" th:if="${m.dualMode}">
    <div class="section-title" th:text="${m.t.heatingPressureGraph}"></div>
    <div class="chart" th:utext="${heatingPressureDropSvg}"></div>
</div>

<!-- ===== Fans ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.fans}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.fanType}"></td><td class="unit">-</td><td class="value" th:text="${m.fanType}"></td></tr>
        <tr><td class="label" th:text="${m.t.numberOfFans}"></td><td class="unit">n</td><td class="value" th:text="${m.fanQty}"></td></tr>
        <tr><td class="label" th:text="${m.t.airFlowRate}"></td><td class="unit">m³/h</td><td class="value" th:text="${m.airFlowRate}"></td></tr>
    </table>
</div>

<!-- ===== Pipe Connection ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.pipeConnection}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.waterInletConnection}"></td><td class="unit">inch</td><td class="value" th:text="${m.waterInletConnection}"></td></tr>
        <tr><td class="label" th:text="${m.t.waterOutletConnection}"></td><td class="unit">inch</td><td class="value" th:text="${m.waterOutletConnection}"></td></tr>
    </table>
</div>

<!-- ===== Electrical Data ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.electricalData}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.moc}"></td><td class="unit">A</td><td class="value" th:text="${m.moc}"></td></tr>
        <tr><td class="label" th:text="${m.t.lra}"></td><td class="unit">A</td><td class="value" th:text="${m.lra}"></td></tr>
    </table>
</div>

<!-- ===== Unit Dimensions ===== -->
<div class="avoid-break">
    <div class="section-title" th:text="${m.t.unitDimensions}"></div>
    <table class="data">
        <tr><td class="label" th:text="${m.t.length}"></td><td class="unit">mm</td><td class="value" th:text="${m.length}"></td></tr>
        <tr><td class="label" th:text="${m.t.width}"></td><td class="unit">mm</td><td class="value" th:text="${m.width}"></td></tr>
        <tr><td class="label" th:text="${m.t.height}"></td><td class="unit">mm</td><td class="value" th:text="${m.height}"></td></tr>
    </table>
</div>

<!-- ===== Technical Drawings (end of report) ===== -->
<div th:if="${not #lists.isEmpty(drawings)}">
    <div class="section-title" th:text="${m.t.technicalDrawings}"></div>
    <div class="drawing" th:each="d : ${drawings}">
        <img class="drawing-image" th:src="${d}" alt=""/>
    </div>
</div>

</body>
</html>
