server:
  tomcat:
    # Let Tomcat read/discard an over-limit upload so it returns a clean 413 instead of resetting the connection.
    max-swallow-size: -1

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  datasource:
    # Railway's DATABASE_URL is "postgresql://user:pass@host:port/db", which pgjdbc/Hikari can't use.
    # Build a proper JDBC URL from the component vars (also provided by Railway's Postgres service).
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
      show-sql: false
      dialect: PostgreSQLDialect
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      account-activation-key: ${JWT_ACCOUNT_ACTIVATION_KEY}
      reset-password-key: ${JWT_RESET_PASSWORD_KEY}
      account-deletion-key: ${JWT_ACCOUNT_DELETION_KEY}
      access-token-exp-time: 900
      refresh-token-exp-time: 2592000
      account-deletion-key-exp-time: 900
      reset-password-key-exp-time: 900
      same-site: ${SAME_SITE}
  storage:
    r2:
      access-key: ${R2_ACCESS_KEY}
      secret-key: ${R2_SECRET_KEY}
      region: auto
      endpoint: https://c0c51a06f0c819ad0fd3ff0776d7ce26.r2.cloudflarestorage.com
      bucket-name: osp-asset
      public-base-url: ${R2_PUBLIC_BASE_URL}

mailgun:
  api-key: ${MAILGUN_API_KEY}

app:
  frontend:
    # Base URL used to build links in emails (activation, password reset, etc.). No trailing slash.
    url: ${FRONTEND_URL}
  cors:
    # Comma-separated list of frontend origins, e.g. https://app.example.com,https://www.example.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
